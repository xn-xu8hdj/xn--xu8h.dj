<!DOCTYPE html>
<html>
  <body style="margin:0;display:flex;justify-content:center;align-items:center;height:100vh;width:100vw;overflow:hidden;">
    <span id="text" style="font-size:10vw;white-space:nowrap;">📻️.dj</span>
    <script>
      const text = document.getElementById("text");
      function resize() {
        const scale = Math.min(window.innerWidth / text.offsetWidth, window.innerHeight / text.offsetHeight);
        text.style.transform = `scale(${scale})`;
      }
      window.addEventListener("resize", resize);
      resize();
    </script>
  </body>
</html>
